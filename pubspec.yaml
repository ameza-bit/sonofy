name: sonofy
description: "Una aplicación de reproductor de música moderna con interfaz intuitiva que incluye exploración de biblioteca, reproductor con controles completos y visualización de letras sincronizadas."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  audioplayers: ^6.3.0
  flutter:
    sdk: flutter
  go_router: ^14.8.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/music/
